# ── docker-compose.yml — Development ──────────────────────────────────────────
# Full hot-reload dev environment: MongoDB + Express server + Vite client
#
# Usage:
#   docker compose up --build        # first time or after dep changes
#   docker compose up                # subsequent runs (faster)
#   docker compose down              # stop (preserves DB data)
#   docker compose down -v           # stop + wipe DB volume
#
# App URLs:
#   Frontend  → http://localhost:5173
#   API       → http://localhost:5000
#   MongoDB   → localhost:27017 (exposed for DB tools like Compass)

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: cs16_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Express API Server ─────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server-dev
    container_name: cs16_server
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/faqapp
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
    env_file:
      # Loads extra vars from server/.env (JWT_SECRET, SMTP_URL, etc.)
      # Copy server/.env.example → server/.env and fill in your secrets
      - path: ./server/.env
        required: false
    volumes:
      # Bind-mount source for nodemon hot-reload
      - ./server:/app
      # Prevent host node_modules from overwriting container's
      - /app/node_modules
      # Persist uploaded files on the host
      - ./server/uploads:/app/uploads

  # ── Vite Frontend ──────────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile
      target: client-dev
    container_name: cs16_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      # Bind-mount source for Vite HMR
      - ./client:/app
      # Prevent host node_modules from overwriting container's
      - /app/node_modules
    environment:
      - NODE_ENV=development

volumes:
  mongo_data:
    name: cs16_mongo_data
