name: Auto Assign & Self-Assign Issues

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    steps:
      # 1. Standard auto-assign for newly opened issues (using pozil action)
      - name: Auto-assign Issue Creator
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: pozil/auto-assign-issue@v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: ${{ github.actor }}
          allowSelfAssign: true

      # 2. Command-based self-assignment via comment (.take or /assign)
      - name: Self-assign on Comment
        if: github.event_name == 'issue_comment' && github.event.action == 'created' && (contains(github.event.comment.body, '/assign') || contains(github.event.comment.body, '.take'))
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: [context.payload.comment.user.login]
            });
